<header class="site-header">
    <nav class="navigation">
        <div class="nav-brand">
            <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
        </div>
        {{ if .Site.Menus.main }}
            <ul class="nav-menu">
                {{ range .Site.Menus.main }}
                    <li><a href="{{ .URL }}">{{ .Name }}</a></li>
                {{ end }}
            </ul>
        {{ end }}
    </nav>
</header>
