{{- if .Site.Params.custom_js }}
{{ range .Site.Params.custom_js }}
<script src="{{ . }}"></script>
{{ end }}
{{- end }}

{{- if .Site.Params.enable_mathjax }}
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{{- end }}

{{- if .Site.Params.enable_highlight }}
{{ template "_internal/google_analytics.html" . }}
{{- end }}

{{- if .Site.Params.dev_mode }}
<script>
// Development mode: Add debugging tools
if (window.location.hostname === 'localhost') {
    console.log('🚀 Hugo Cal.com Booking Module - Development Mode');
    
    // Health check endpoint
    window.addEventListener('load', function() {
        const healthCheck = {
            timestamp: new Date().toISOString(),
            hugoVersion: '{{ hugo.Version }}',
            siteTitle: '{{ .Site.Title }}',
            calBookingLoaded: !!document.querySelector('.cal-booking-methods')
        };
        console.log('Health Check:', healthCheck);
        
        // Make health check available globally
        window.calBookingHealth = healthCheck;
    });
}
</script>
{{- end }}
